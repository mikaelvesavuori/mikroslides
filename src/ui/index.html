<!doctype html>
<html lang="en">

  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MikroSlides</title>
    <link rel="stylesheet" href="./assets/styles.css" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./app-icon.svg" type="image/svg+xml" />
    <meta name="theme-color" content="#f4f6f9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b0d10" media="(prefers-color-scheme: dark)" />
  </head>

  <body>
    <svg class="icon-sprite" aria-hidden="true" focusable="false">
      <symbol id="icon-plus" viewBox="0 0 24 24">

      <symbol id="icon-check" viewBox="0 0 24 24">

      <symbol id="icon-focus" viewBox="0 0 24 24">
        <path
          d="M8 4.5H5.25a.75.75 0 0 0-.75.75V8m15 0V5.25a.75.75 0 0 0-.75-.75H16m0 15h2.75a.75.75 0 0 0 .75-.75V16m-15 0v2.75c0 .414.336.75.75.75H8"

      <symbol id="icon-bookmark" viewBox="0 0 24 24">

      <symbol id="icon-redo" viewBox="0 0 24 24">

      <symbol id="icon-copy-object" viewBox="0 0 24 24">

      <symbol id="icon-copy-slide" viewBox="0 0 24 24">

      <symbol id="icon-skip-slide" viewBox="0 0 24 24">

      </symbol>
      <symbol id="icon-folder-open" viewBox="0 0 24 24">
        <path
          d="M3.75 6.75A2.25 2.25 0 0 1 6 4.5h3.294a2.25 2.25 0 0 1 1.591.659l1.206 1.205a2.25 2.25 0 0 0 1.591.659H18A2.25 2.25 0 0 1 20.25 9.27v7.98A2.25 2.25 0 0 1 18 19.5H6a2.25 2.25 0 0 1-2.25-2.25V6.75Z"
          stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-upload" viewBox="0 0 24 24">
        <path d="M4 16.5v2A2.5 2.5 0 0 0 6.5 21h11a2.5 2.5 0 0 0 2.5-2.5v-2M12 15V3m-4 4 4-4 4 4" stroke-linecap="round"
          stroke-linejoin="round" />

      <symbol id="icon-download" viewBox="0 0 24 24">
        <path d="M4 16.5v2A2.5 2.5 0 0 0 6.5 21h11a2.5 2.5 0 0 0 2.5-2.5v-2M12 3v12m-4-4 4 4 4-4" stroke-linecap="round"
          stroke-linejoin="round" />

      <symbol id="icon-file" viewBox="0 0 24 24">
        <path d="M14 3v5h5M14 3H6v18h12V8l-4-5Z" stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-list" viewBox="0 0 24 24">
        <path d="M8 6.5h11M8 12h11M8 17.5h11M4.75 6.5h.01M4.75 12h.01M4.75 17.5h.01" stroke-linecap="round"
          stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-package" viewBox="0 0 24 24">
        <path d="m12 3 8 4.5v9L12 21l-8-4.5v-9L12 3Zm0 9 8-4.5M12 12 4 7.5m8 4.5v9" stroke-linecap="round"
          stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-command" viewBox="0 0 24 24">
        <path
          d="M9 9H7.25A2.25 2.25 0 1 1 9 5.34V9Zm0 0v6m0 0H7.25A2.25 2.25 0 1 0 9 18.66V15Zm0 0h6m0 0v1.75A2.25 2.25 0 1 0 18.66 15H15Zm0 0V9m0 0v-1.75A2.25 2.25 0 1 1 18.66 9H15Zm0 0H9"
          stroke-linecap="round" stroke-linejoin="round" />

      <symbol id="icon-printer" viewBox="0 0 24 24">
        <path
          d="M6.75 9V4.5h10.5V9M6.75 18H5.25A2.25 2.25 0 0 1 3 15.75V12a3 3 0 0 1 3-3h12a3 3 0 0 1 3 3v3.75A2.25 2.25 0 0 1 18.75 18h-1.5m-10.5-3h10.5v6H6.75v-6Z"
          stroke-linecap="round" stroke-linejoin="round" />

      <symbol id="icon-play" viewBox="0 0 24 24">
        <path d="M6.75 4.75v14.5L18.5 12 6.75 4.75Z" stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-type" viewBox="0 0 24 24">
        <path d="M4.5 6.75V4.5h15v2.25M12 4.5v15m-3.75 0h7.5" stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-square" viewBox="0 0 24 24">
        <path d="M5.25 5.25h13.5v13.5H5.25z" stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-line" viewBox="0 0 24 24">
        <path d="M4 12h16" stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-arrow" viewBox="0 0 24 24">
        <path d="M4 12h15m-5-5 5 5-5 5" stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-rectangle" viewBox="0 0 24 24">
        <path d="M5 6h14v12H5z" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-ellipse" viewBox="0 0 24 24">
        <path d="M4.5 12a7.5 5.5 0 1 0 15 0 7.5 5.5 0 1 0-15 0" />
      </symbol>
      <symbol id="icon-diamond" viewBox="0 0 24 24">
        <path d="m12 3.5 8.5 8.5-8.5 8.5L3.5 12 12 3.5Z" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-triangle" viewBox="0 0 24 24">
        <path d="M12 4 21 20H3L12 4Z" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-capsule" viewBox="0 0 24 24">
        <rect x="4" y="6" width="16" height="12" rx="6" />
      </symbol>
      <symbol id="icon-document-shape" viewBox="0 0 24 24">
        <path d="M5 4.5h14v12.2c-3.2 2.2-5.8 2.2-8.8.5-1.8-1-3.4-1-5.2.2V4.5Z" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-database-shape" viewBox="0 0 24 24">
        <path d="M5 7.5c0-2 3.1-3.5 7-3.5s7 1.5 7 3.5v9c0 2-3.1 3.5-7 3.5s-7-1.5-7-3.5v-9Z" stroke-linejoin="round" />
        <path d="M5 7.5c0 2 3.1 3.5 7 3.5s7-1.5 7-3.5M5 12c0 2 3.1 3.5 7 3.5s7-1.5 7-3.5" stroke-linecap="round"
          stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-parallelogram" viewBox="0 0 24 24">
        <path d="M8 5h13l-5 14H3L8 5Z" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-trapezoid" viewBox="0 0 24 24">
        <path d="M7 5h10l4 14H3L7 5Z" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-hexagon" viewBox="0 0 24 24">
        <path d="M8 4h8l5 8-5 8H8l-5-8 5-8Z" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-octagon" viewBox="0 0 24 24">
        <path d="M8 4h8l4 4v8l-4 4H8l-4-4V8l4-4Z" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-chevron-shape" viewBox="0 0 24 24">
        <path d="M4 5h10l6 7-6 7H4l6-7-6-7Z" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-image" viewBox="0 0 24 24">
        <path
          d="M4.5 6.75A2.25 2.25 0 0 1 6.75 4.5h10.5a2.25 2.25 0 0 1 2.25 2.25v10.5a2.25 2.25 0 0 1-2.25 2.25H6.75a2.25 2.25 0 0 1-2.25-2.25V6.75Zm3 9 3.5-3.5 2.25 2.25 2.75-3.25 3.5 4.5M8.25 8.25h.01"
          stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-sun" viewBox="0 0 24 24">
        <path
          d="M12 3v1.5m0 15V21m8.485-8.485H21m-18 0H3m15.364-6.364 1.06-1.06M4.576 19.425l1.06-1.06m12.728 0 1.06 1.06M4.576 4.575l1.06 1.06M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"
          stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-moon" viewBox="0 0 24 24">
        <path fill="currentColor" stroke="none"
          d="M12 20.5a8.5 8.5 0 0 0 8.5-8.5c0-.7-.1-1.05-.43-1.05-.2 0-.36.12-.56.22a5.8 5.8 0 0 1-2.58.58 4.68 4.68 0 0 1-4.68-4.68c0-.94.2-1.8.58-2.58.1-.2.22-.36.22-.56 0-.33-.35-.43-1.05-.43a8.5 8.5 0 1 0 0 17Z" />
      </symbol>
      <symbol id="icon-x-mark" viewBox="0 0 24 24">
        <path d="m6 18 12-12M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-align-left" viewBox="0 0 24 24">
        <path d="M4.5 6.75h15m-15 4.5h9.75m-9.75 4.5h15m-15 4.5h9.75" stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-align-center" viewBox="0 0 24 24">
        <path d="M4.5 6.75h15m-10.5 4.5h6m-10.5 4.5h15m-10.5 4.5h6" stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-align-right" viewBox="0 0 24 24">
        <path d="M4.5 6.75h15m-5.25 4.5h5.25m-15 4.5h15m-5.25 4.5h5.25" stroke-linecap="round"
          stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-object-align-left" viewBox="0 0 24 24">
        <path d="M5 4v16M9 7h8v10H9z" stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-object-align-center" viewBox="0 0 24 24">
        <path d="M12 4v16M8 7h8v10H8z" stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-object-align-right" viewBox="0 0 24 24">
        <path d="M19 4v16M7 7h8v10H7z" stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-object-align-top" viewBox="0 0 24 24">
        <path d="M4 5h16M7 9h10v8H7z" stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-object-align-middle" viewBox="0 0 24 24">
        <path d="M4 12h16M7 8h10v8H7z" stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-object-align-bottom" viewBox="0 0 24 24">
        <path d="M4 19h16M7 7h10v8H7z" stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-chevron-up" viewBox="0 0 24 24">
        <path d="m6 15 6-6 6 6" stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
      <symbol id="icon-chevron-down" viewBox="0 0 24 24">
        <path d="m6 9 6 6 6-6" stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
    </svg>

    <div id="app-shell" class="app-shell">
      <header class="app-header">
        <div class="brand-block">
          <h1>MikroSlides</h1>
          <input id="deck-title-input" class="deck-title-input" aria-label="Deck title" />
        </div>
        <div class="header-actions">
          <button id="new-deck-btn" class="header-btn icon-btn" type="button" title="New deck" aria-label="New deck">
            <svg class="icon" aria-hidden="true">
              <use href="#icon-plus"></use>
            </svg>
          </button>
          <button id="library-btn" class="header-btn icon-btn" type="button" title="Library" aria-label="Open library">
            <svg class="icon" aria-hidden="true">
              <use href="#icon-folder-open"></use>
            </svg>
          </button>
          <button id="import-json-btn" class="header-btn icon-btn" type="button" title="Import deck"
            aria-label="Import deck">
            <svg class="icon" aria-hidden="true">
              <use href="#icon-upload"></use>
            </svg>
          </button>
          <button id="outline-btn" class="header-btn icon-btn" type="button" title="Deck from Markdown"
            aria-label="Deck from Markdown">
            <svg class="icon" aria-hidden="true">
              <use href="#icon-list"></use>
            </svg>
          </button>
          <button id="export-btn" class="header-btn icon-btn" type="button" title="Export" aria-label="Export">
            <svg class="icon" aria-hidden="true">
              <use href="#icon-download"></use>
            </svg>
          </button>
          <button id="present-btn" class="header-btn icon-btn" type="button" title="Present" aria-label="Present">
            <svg class="icon" aria-hidden="true">
              <use href="#icon-play"></use>
            </svg>
          </button>
          <button id="theme-btn" class="header-btn icon-btn" type="button" title="Toggle color mode"
            aria-label="Toggle color mode">
            <svg class="icon" aria-hidden="true">
              <use id="theme-icon" href="#icon-moon"></use>
            </svg>
          </button>
        </div>
      </header>

      <main class="workspace">
        <aside class="slide-strip" aria-label="Slides">
          <div class="slide-strip-head">
            <span>Slides</span>
            <span id="deck-meta" class="deck-meta"></span>
          </div>
          <div id="slide-list" class="slide-list"></div>
          <button id="add-slide-btn" class="add-slide-btn" type="button">
            <svg class="icon" aria-hidden="true">
              <use href="#icon-plus"></use>
            </svg>
            <span>Slide</span>
          </button>
        </aside>

        <section class="stage-column" aria-label="Slide editor">
          <nav class="tool-dock" aria-label="Slide tools">
            <button id="add-text-btn" class="tool-btn icon-btn" type="button" title="Text" aria-label="Add text">
              <svg class="icon" aria-hidden="true">
                <use href="#icon-type"></use>
              </svg>
            </button>
            <details id="shape-selector" class="shape-selector">
              <summary id="add-shape-btn" class="tool-btn icon-btn shape-trigger" title="Shapes" aria-label="Shapes">
                <svg class="icon" aria-hidden="true">
                  <use id="current-shape-icon" href="#icon-rectangle"></use>
                </svg>
                <svg class="icon chevron-icon" aria-hidden="true">
                  <use href="#icon-chevron-down"></use>
                </svg>
              </summary>
              <div id="shape-options" class="shape-menu" role="menu" aria-label="Shapes and objects"></div>
            </details>
            <button id="add-image-btn" class="tool-btn icon-btn" type="button" title="Image" aria-label="Add image">
              <svg class="icon" aria-hidden="true">
                <use href="#icon-image"></use>
              </svg>
            </button>
            <select id="template-select" class="template-select" aria-label="Slide layout">
              <option value="">Layout</option>
              <option value="title">Title</option>
              <option value="section">Section</option>
              <option value="statement">Statement</option>
              <option value="bullets">Bullets</option>
              <option value="twoColumn">Two-column</option>
              <option value="imageLeft">Image left</option>
              <option value="imageRight">Image right</option>
              <option value="quote">Quote</option>
              <option value="comparison">Comparison</option>
              <option value="timeline">Timeline</option>
              <option value="chartData">Chart/data</option>
              <option value="closing">Closing</option>
            </select>
            <span class="dock-separator" aria-hidden="true"></span>
            <button id="duplicate-element-btn" class="tool-btn icon-btn" type="button" title="Duplicate object"
              aria-label="Duplicate object">
              <svg class="icon" aria-hidden="true">
                <use href="#icon-copy-object"></use>
              </svg>
            </button>
            <button id="duplicate-slide-btn" class="tool-btn icon-btn" type="button" title="Duplicate slide"
              aria-label="Duplicate slide">
              <svg class="icon" aria-hidden="true">
                <use href="#icon-copy-slide"></use>
              </svg>
            </button>
            <button id="delete-slide-btn" class="tool-btn icon-btn danger" type="button" title="Delete slide"
              aria-label="Delete slide">
              <svg class="icon" aria-hidden="true">
                <use href="#icon-trash"></use>
              </svg>
            </button>
          </nav>
          <section id="selection-toolbar" class="selection-toolbar" role="toolbar" aria-label="Selection controls"
            hidden>
            <span id="selection-toolbar-label" class="selection-toolbar-label"></span>
            <span class="selection-toolbar-separator" aria-hidden="true"></span>
            <span class="selection-toolbar-group" data-selection-group="text">
              <button class="selection-swatch" data-text-color="#111827" style="--swatch: #111827" type="button"
                title="Ink text" aria-label="Ink text"></button>
              <button class="selection-swatch" data-text-color="#ffffff" style="--swatch: #ffffff" type="button"
                title="White text" aria-label="White text"></button>
              <button class="selection-swatch" data-text-color="#1665d8" style="--swatch: #1665d8" type="button"
                title="Blue text" aria-label="Blue text"></button>
              <button class="selection-toolbar-btn" type="button" data-align="left" title="Align text left"
                aria-label="Align text left">
                <svg class="icon" aria-hidden="true">
                  <use href="#icon-align-left"></use>
                </svg>
              </button>
              <button class="selection-toolbar-btn" type="button" data-align="center" title="Center text"
                aria-label="Center text">
                <svg class="icon" aria-hidden="true">
                  <use href="#icon-align-center"></use>
                </svg>
              </button>
              <button class="selection-toolbar-btn" type="button" data-align="right" title="Align text right"
                aria-label="Align text right">
                <svg class="icon" aria-hidden="true">
                  <use href="#icon-align-right"></use>
                </svg>
              </button>
            </span>
            <span class="selection-toolbar-group" data-selection-group="shape">
              <button class="selection-toolbar-btn" data-selection-action="clear-fill" type="button" title="No fill"
                aria-label="No fill">
                <svg class="icon" aria-hidden="true">
                  <use href="#icon-x-mark"></use>
                </svg>
              </button>
              <button class="selection-swatch" data-shape-fill="#fde68a" style="--swatch: #fde68a" type="button"
                title="Yellow fill" aria-label="Yellow fill"></button>
              <button class="selection-swatch" data-shape-fill="#dbeafe" style="--swatch: #dbeafe" type="button"
                title="Blue fill" aria-label="Blue fill"></button>
              <button class="selection-swatch" data-shape-fill="#d1fae5" style="--swatch: #d1fae5" type="button"
                title="Mint fill" aria-label="Mint fill"></button>
              <button class="selection-swatch" data-shape-fill="#ffe4e6" style="--swatch: #ffe4e6" type="button"
                title="Rose fill" aria-label="Rose fill"></button>
            </span>
            <span class="selection-toolbar-group" data-selection-group="common">
              <button class="selection-toolbar-btn" type="button" data-object-align="left" title="Align left"
                aria-label="Align object left">
                <svg class="icon" aria-hidden="true">
                  <use href="#icon-object-align-left"></use>
                </svg>
              </button>
              <button class="selection-toolbar-btn" type="button" data-object-align="center" title="Align center"
                aria-label="Align object center">
                <svg class="icon" aria-hidden="true">
                  <use href="#icon-object-align-center"></use>
                </svg>
              </button>
              <button class="selection-toolbar-btn" type="button" data-object-align="right" title="Align right"
                aria-label="Align object right">
                <svg class="icon" aria-hidden="true">
                  <use href="#icon-object-align-right"></use>
                </svg>
              </button>
            </span>
            <span class="selection-toolbar-group" data-selection-group="actions">
              <button class="selection-toolbar-btn" data-selection-action="front" type="button" title="Bring to front"
                aria-label="Bring to front">
                <svg class="icon" aria-hidden="true">
                  <use href="#icon-chevron-up"></use>
                </svg>
              </button>
              <button class="selection-toolbar-btn" data-selection-action="back" type="button" title="Send to back"
                aria-label="Send to back">
                <svg class="icon" aria-hidden="true">
                  <use href="#icon-chevron-down"></use>
                </svg>
              </button>

      <div class="command-head">
        <label for="command-input">Command</label>
        <input id="command-input" class="command-input" type="search" autocomplete="off" placeholder="Search commands"
          aria-controls="command-list" />
      </div>
      <div id="command-list" class="command-list" role="listbox"></div>
    </dialog>

    <div id="context-menu" class="context-menu" role="menu" hidden>
      <button type="button" role="menuitem" data-context-action="copy">Copy</button>
      <button type="button" role="menuitem" data-context-action="cut">Cut</button>
      <button type="button" role="menuitem" data-context-action="paste">Paste</button>
      <button type="button" role="menuitem" data-context-action="duplicate">Duplicate</button>
      <button type="button" role="menuitem" data-context-action="lock">Lock</button>
      <button type="button" role="menuitem" data-context-action="unlock">Unlock</button>
      <span class="context-menu-separator" aria-hidden="true"></span>
      <button type="button" role="menuitem" data-context-action="bring-front">Bring to front</button>
      <button type="button" role="menuitem" data-context-action="send-back">Send to back</button>
      <span class="context-menu-separator" aria-hidden="true"></span>
      <button type="button" role="menuitem" data-context-action="add-text">Add text</button>
      <button type="button" role="menuitem" data-context-action="add-shape">Add shape</button>
      <button type="button" role="menuitem" data-context-action="add-image">Add image</button>
      <span class="context-menu-separator" aria-hidden="true"></span>
      <button type="button" role="menuitem" data-context-action="delete" class="danger">Delete</button>
    </div>

    <div id="slide-context-menu" class="context-menu" role="menu" hidden>
      <button type="button" role="menuitem" data-slide-context-action="duplicate">Duplicate slide</button>
      <button type="button" role="menuitem" data-slide-context-action="copy">Copy slide</button>
      <button type="button" role="menuitem" data-slide-context-action="cut">Cut slide</button>
      <button type="button" role="menuitem" data-slide-context-action="paste-after">Paste after</button>
      <span class="context-menu-separator" aria-hidden="true"></span>
      <button type="button" role="menuitem" data-slide-context-action="move-up">Move up</button>
      <button type="button" role="menuitem" data-slide-context-action="move-down">Move down</button>
      <span class="context-menu-separator" aria-hidden="true"></span>
      <button type="button" role="menuitem" data-slide-context-action="toggle-skip">Skip slide</button>
      <span class="context-menu-separator" aria-hidden="true"></span>
      <button type="button" role="menuitem" data-slide-context-action="delete" class="danger">Delete slide</button>
    </div>

    <dialog id="presenter-dialog" class="presenter-dialog" aria-label="Presentation mode">
      <div class="presenter-stage">
        <div id="presenter-slide" class="presenter-slide" tabindex="0"></div>
      </div>
      <footer class="presenter-bar">
        <button id="presenter-prev-btn" class="header-btn icon-btn" type="button" title="Previous slide"
          aria-label="Previous slide">
          <svg class="icon" aria-hidden="true">
            <use href="#icon-chevron-up"></use>
          </svg>
        </button>
        <div id="presenter-meta" class="presenter-meta"></div>
        <button id="presenter-next-btn" class="header-btn icon-btn" type="button" title="Next slide"
          aria-label="Next slide">
          <svg class="icon" aria-hidden="true">
            <use href="#icon-chevron-down"></use>
          </svg>
        </button>
        <button class="header-btn icon-btn" type="button" data-close-dialog="presenter-dialog" title="Close"
          aria-label="Close presentation">
          <svg class="icon" aria-hidden="true">
            <use href="#icon-x-mark"></use>
          </svg>
        </button>
      </footer>
    </dialog>

    <input id="json-file-input" class="visually-hidden" type="file"
      accept=".mikroslides,.mikroslides.json,.mikroslides.md,.json,.md,.markdown,application/json,application/vnd.mikroslides+json,text/markdown,text/plain" />
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <div id="print-deck" class="print-deck" aria-hidden="true"></div>
    <script type="module" src="./assets/main.js"></script>
  </body>

</html>
